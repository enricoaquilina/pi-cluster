---
name: Auto-Merge

on:
  # Trigger after key workflows complete
  workflow_run:
    workflows: ["AI PR Review", "Claude Code Fix", "Lint", "Validate", "Security Scan"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Merge if all checks pass
    runs-on: ubuntu-latest
    # Only proceed if the triggering workflow succeeded (or was skipped)
    if: |
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'skipped'
    steps:
      - name: Get PR number from workflow run
        id: pr
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUMBER=""
          if [ -n "$HEAD_BRANCH" ] && [ "$HEAD_BRANCH" != "master" ]; then
            PR_NUMBER=$(gh pr list -R "${{ github.repository }}" \
              --head "$HEAD_BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Found PR #${PR_NUMBER} from branch ${HEAD_BRANCH}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for all checks then merge
        if: steps.pr.outputs.number != ''
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          echo "Checking PR #${PR_NUMBER}..."

          # Retry loop â€” other checks may still be running
          for attempt in 1 2 3 4 5; do
            sleep 15
            CHECK_OUTPUT=$(gh pr checks "$PR_NUMBER" -R "${{ github.repository }}" 2>&1 || true)
            FAILED=$(echo "$CHECK_OUTPUT" | grep -ci "fail" || true)
            PENDING=$(echo "$CHECK_OUTPUT" | grep -ci "pending" || true)

            echo "Attempt $attempt: failed=$FAILED pending=$PENDING"
            echo "$CHECK_OUTPUT"

            if [ "$FAILED" -gt 0 ]; then
              echo "::warning::PR has failing checks, skipping merge"
              exit 0
            fi

            if [ "$PENDING" -eq 0 ]; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "::warning::Checks still pending after 5 attempts, skipping"
              exit 0
            fi
          done

          # Check no review requesting changes
          REVIEW_DECISION=$(gh pr view "$PR_NUMBER" -R "${{ github.repository }}" \
            --json reviewDecision -q '.reviewDecision' 2>/dev/null || echo "")
          if [ "$REVIEW_DECISION" = "CHANGES_REQUESTED" ]; then
            echo "::warning::PR has changes requested, skipping merge"
            exit 0
          fi

          echo "All checks passed, merging PR #${PR_NUMBER}..."
          gh pr merge "$PR_NUMBER" -R "${{ github.repository }}" \
            --squash --delete-branch \
            || echo "::error::Merge failed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
