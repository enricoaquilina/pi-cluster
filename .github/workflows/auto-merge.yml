---
name: Auto-Merge

on:
  # Trigger after key workflows complete
  workflow_run:
    workflows: ["AI PR Review", "Claude Code Fix", "Lint", "Validate", "Security Scan"]
    types: [completed]
  # Also run on schedule to catch merge conflicts from master changes
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes

permissions:
  contents: write
  pull-requests: write

jobs:
  # Detect and flag merge conflicts on all open PRs
  conflict-check:
    name: Check for merge conflicts
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_run'
    steps:
      - name: Flag conflicting PRs
        run: |
          # Get all open PRs
          PRS=$(gh pr list -R "${{ github.repository }}" --state open --json number,headRefName,mergeable -q '.[]')
          echo "$PRS" | while IFS= read -r pr; do
            [ -z "$pr" ] && continue
            PR_NUM=$(echo "$pr" | jq -r '.number')
            BRANCH=$(echo "$pr" | jq -r '.headRefName')
            MERGEABLE=$(echo "$pr" | jq -r '.mergeable')

            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "PR #${PR_NUM} (${BRANCH}) has merge conflicts"

              # Check if we already commented about conflicts (avoid spam)
              EXISTING=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" \
                --json comments -q '.comments[].body' 2>/dev/null \
                | grep -c "Merge conflict detected" || true)

              if [ "$EXISTING" -eq 0 ]; then
                COMMENT_BODY="**Merge conflict detected**"
                COMMENT_BODY+=$'\n\n'"This PR has conflicts with master that need to be resolved before it can be merged."
                COMMENT_BODY+=$'\n\n'"To fix: rebase onto latest master and force-push."
                COMMENT_BODY+=$'\n\n'"_Auto-detected by merge conflict checker_"
                gh pr comment "$PR_NUM" -R "${{ github.repository }}" --body "$COMMENT_BODY"
                # Add a label if available
                gh pr edit "$PR_NUM" -R "${{ github.repository }}" \
                  --add-label "conflict" 2>/dev/null || true
                echo "Commented on PR #${PR_NUM}"
              else
                echo "Already commented on PR #${PR_NUM}, skipping"
              fi
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    name: Merge if all checks pass
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' && (
        github.event.workflow_run.conclusion == 'success' ||
        github.event.workflow_run.conclusion == 'skipped'
      )
    steps:
      - name: Get PR number from workflow run
        id: pr
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUMBER=""
          if [ -n "$HEAD_BRANCH" ] && [ "$HEAD_BRANCH" != "master" ]; then
            PR_NUMBER=$(gh pr list -R "${{ github.repository }}" \
              --head "$HEAD_BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Found PR #${PR_NUMBER} from branch ${HEAD_BRANCH}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check mergeability
        if: steps.pr.outputs.number != ''
        id: mergeable
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          MERGEABLE=$(gh pr view "$PR_NUMBER" -R "${{ github.repository }}" \
            --json mergeable -q '.mergeable' 2>/dev/null || echo "UNKNOWN")
          echo "status=$MERGEABLE" >> "$GITHUB_OUTPUT"
          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            echo "::warning::PR #${PR_NUMBER} has merge conflicts — cannot auto-merge"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get head SHA
        if: steps.pr.outputs.number != '' && steps.mergeable.outputs.status != 'CONFLICTING'
        id: sha
        run: |
          HEAD_SHA=$(gh pr view "${{ steps.pr.outputs.number }}" -R "${{ github.repository }}" \
            --json headRefOid -q '.headRefOid' 2>/dev/null || echo "")
          echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "Head SHA: $HEAD_SHA"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for all checks then merge
        if: steps.pr.outputs.number != '' && steps.mergeable.outputs.status != 'CONFLICTING' && steps.sha.outputs.sha != ''
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          HEAD_SHA="${{ steps.sha.outputs.sha }}"
          REPO="${{ github.repository }}"
          # Required checks — these must explicitly pass
          REQUIRED_CHECKS="ShellCheck,YAML Lint,Ansible Syntax Check"

          echo "Checking PR #${PR_NUMBER} (SHA: ${HEAD_SHA})..."

          # Retry loop — other checks may still be running
          for attempt in 1 2 3 4 5 6 7 8; do
            sleep 20

            # Fetch raw JSON from REST API (no --jq to avoid mixed stderr)
            RAW_RESPONSE=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs" 2>/dev/null || echo "")

            # Validate response is JSON and extract check runs
            if ! echo "$RAW_RESPONSE" | jq -e '.check_runs' >/dev/null 2>&1; then
              echo "Attempt $attempt: API returned invalid response, retrying..."
              continue
            fi

            CHECKS_JSON=$(echo "$RAW_RESPONSE" | jq '[.check_runs[] | {name: .name, status: .status, conclusion: .conclusion}]')
            TOTAL=$(echo "$CHECKS_JSON" | jq 'length')
            FAILED=$(echo "$CHECKS_JSON" | jq '[.[] | select(.conclusion == "failure")] | length')
            PENDING=$(echo "$CHECKS_JSON" | jq '[.[] | select(.status != "completed")] | length')

            echo "Attempt $attempt: total=$TOTAL failed=$FAILED pending=$PENDING"
            echo "$CHECKS_JSON" | jq -r '.[] | "\(.name): \(.status) / \(.conclusion)"'

            # Fail-safe: if 0 checks found, API may have errored — do NOT merge
            if [ "$TOTAL" -eq 0 ]; then
              echo "::warning::No checks found (possible API error). Skipping merge."
              exit 0
            fi

            if [ "$FAILED" -gt 0 ]; then
              echo "::warning::PR has $FAILED failing check(s), skipping merge"
              exit 0
            fi

            if [ "$PENDING" -eq 0 ]; then
              break
            fi

            if [ "$attempt" -eq 8 ]; then
              echo "::warning::Checks still pending after 8 attempts (~3 min), skipping"
              exit 0
            fi
          done

          # Verify required checks explicitly passed
          for check_name in ${REQUIRED_CHECKS//,/ }; do
            STATUS=$(echo "$CHECKS_JSON" | jq -r --arg name "$check_name" \
              '[.[] | select(.name == $name) | .conclusion] | first // empty')
            if [ -z "$STATUS" ]; then
              echo "::warning::Required check '${check_name}' not found, skipping merge"
              exit 0
            fi
            if [ "$STATUS" != "success" ]; then
              echo "::warning::Required check '${check_name}' has conclusion '${STATUS}', skipping merge"
              exit 0
            fi
            echo "Required check '${check_name}': $STATUS"
          done

          # Check no review requesting changes
          REVIEW_DECISION=$(gh pr view "$PR_NUMBER" -R "$REPO" \
            --json reviewDecision -q '.reviewDecision' 2>/dev/null || echo "")
          if [ "$REVIEW_DECISION" = "CHANGES_REQUESTED" ]; then
            echo "::warning::PR has changes requested, skipping merge"
            exit 0
          fi

          echo "All checks passed, merging PR #${PR_NUMBER}..."
          gh pr merge "$PR_NUMBER" -R "$REPO" \
            --squash --delete-branch \
            || echo "::error::Merge failed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
