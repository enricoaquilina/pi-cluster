---
name: Claude Code Fix

on:
  # Trigger when PR-Agent posts code suggestions as PR comments
  issue_comment:
    types: [created]
  # Trigger after AI PR Review completes (to auto-fix suggestions)
  # AND after Lint/Validate/Security workflows fail (to auto-fix CI errors)
  workflow_run:
    workflows: ["AI PR Review", "Lint", "Validate", "Security Scan"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-fix-on-comment:
    name: Claude Auto-Fix (comment)
    # Run when a bot posts a PR comment with code suggestions, or @claude is mentioned
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      (
        (github.event.comment.user.type == 'Bot' &&
         contains(github.event.comment.body, 'Code Suggestions')) ||
        contains(github.event.comment.body, '@claude')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Get PR branch
        id: pr
        run: |
          PR_DATA=$(gh pr view "${{ github.event.issue.number }}" \
            -R "${{ github.repository }}" --json headRefName -q '.headRefName')
          echo "branch=$PR_DATA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-20250514"
          trigger_phrase: "@claude"
          timeout_minutes: 30
          direct_prompt: |
            Review the PR comments posted by the automated reviewer (PR-Agent).
            Look for the "Code Suggestions" comment with specific code improvements.
            For each suggestion:
            1. Determine if the suggestion is valid and improves the code
            2. If valid, make the fix directly
            3. If not valid (false positive or harmful), skip it
            Focus on: security fixes, Ansible best practices,
            shell script safety, and systemd service correctness.
            Do NOT make cosmetic-only changes.
            Commit fixes with clear messages.

  claude-fix-on-review:
    name: Claude Auto-Fix (post-review)
    # Run after AI PR Review completes successfully
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'AI PR Review' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUMBER=$(gh pr list -R "${{ github.repository }}" \
            --head "$HEAD_BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"

          # Check if PR-Agent posted code suggestions
          if [ -n "$PR_NUMBER" ]; then
            HAS_SUGGESTIONS=$(gh pr view "$PR_NUMBER" -R "${{ github.repository }}" \
              --json comments --jq '.comments[] | select(.author.login == "github-actions") | select(.body | contains("Code Suggestions")) | .id' 2>/dev/null | head -1)
            if [ -n "$HAS_SUGGESTIONS" ]; then
              echo "has_suggestions=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_suggestions=false" >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        if: steps.pr.outputs.has_suggestions == 'true'
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        if: steps.pr.outputs.has_suggestions == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-20250514"
          timeout_minutes: 30
          direct_prompt: |
            Review PR #${{ steps.pr.outputs.number }} in this repository.
            The automated reviewer (PR-Agent) has posted code suggestions.
            Read the PR comments to find them.
            For each suggestion:
            1. Determine if the suggestion is valid and improves the code
            2. If valid, make the fix directly
            3. If not valid, skip it
            Focus on: security fixes, Ansible best practices,
            shell script safety, and systemd service correctness.
            Do NOT make cosmetic-only changes.
            Commit fixes with clear messages.

  claude-fix-on-ci-failure:
    name: Claude Auto-Fix (CI failure)
    # Run when Lint, Validate, or Security Scan fails on a PR branch
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'master' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR and failure details
        id: pr
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          REPO="${{ github.repository }}"

          PR_NUMBER=$(gh pr list -R "$REPO" \
            --head "$HEAD_BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for branch $HEAD_BRANCH, skipping"
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          echo "workflow=$WORKFLOW_NAME" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

          # Check if Claude already attempted a fix for this run (prevent loops)
          LAST_COMMIT_MSG=$(gh pr view "$PR_NUMBER" -R "$REPO" \
            --json commits --jq '.commits[-1].messageHeadline' 2>/dev/null || echo "")
          if echo "$LAST_COMMIT_MSG" | grep -qi "auto-fix\|ci fix\|fix.*shellcheck\|fix.*lint\|fix.*yaml"; then
            echo "::warning::Last commit looks like an auto-fix attempt, skipping to prevent loop"
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get failed job logs
          FAILED_LOG=$(gh run view "$RUN_ID" -R "$REPO" --log-failed 2>&1 | tail -100)
          # Escape for GitHub output
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          {
            echo "failed_log<<$EOF_MARKER"
            echo "$FAILED_LOG"
            echo "$EOF_MARKER"
          } >> "$GITHUB_OUTPUT"

          echo "should_fix=true" >> "$GITHUB_OUTPUT"
          echo "Found PR #$PR_NUMBER, workflow '$WORKFLOW_NAME' failed (run $RUN_ID)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        if: steps.pr.outputs.should_fix == 'true'
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        if: steps.pr.outputs.should_fix == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: anthropics/claude-code-action@beta
        if: steps.pr.outputs.should_fix == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-20250514"
          timeout_minutes: 30
          direct_prompt: |
            The "${{ steps.pr.outputs.workflow }}" CI workflow FAILED on PR #${{ steps.pr.outputs.number }}.

            Here are the failed job logs:
            ```
            ${{ steps.pr.outputs.failed_log }}
            ```

            Your job is to fix the code so the CI check passes. Common issues:
            - ShellCheck warnings (SC2034 unused vars, SC2155 declare+assign, SC1090 source directive)
            - YAML lint errors (indentation, trailing spaces, line length)
            - Ansible syntax errors (undefined variables, wrong module params)
            - Security scan findings (hardcoded secrets, unsafe permissions)

            Instructions:
            1. Read the error logs carefully to identify the exact file(s) and line(s)
            2. Fix ONLY the issues flagged by CI — do not refactor or improve unrelated code
            3. If the failure is transient (network timeout, 502 error), do NOT make code changes — just comment on the PR that it was a transient failure
            4. Commit with message: "Auto-fix: resolve ${{ steps.pr.outputs.workflow }} failure"
            5. Push the fix

            IMPORTANT: Do NOT fix issues that aren't real code problems (e.g., flaky network, Ansible Galaxy 502).
            IMPORTANT: Do NOT make cosmetic changes or improvements beyond what CI flagged.
