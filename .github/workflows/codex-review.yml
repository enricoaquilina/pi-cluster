---
name: GPT-5.4 Strict Review

on:
  workflow_run:
    workflows: ["AI PR Review"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  review:
    name: GPT-5.4 Deep Review
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr
        run: |
          PR_NUM="${{ github.event.workflow_run.pull_requests[0].number }}"
          if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No PR associated with this workflow run"
            exit 0
          fi
          PR_STATE=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" --json state -q '.state')
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR #$PR_NUM is $PR_STATE, skipping"
            exit 0
          fi
          BRANCH=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" --json headRefName -q '.headRefName')
          BASE=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" --json baseRefName -q '.baseRefName')
          TITLE=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" --json title -q '.title')
          BODY_TEXT=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" --json body -q '.body' | head -100)
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "$BODY_TEXT" > /tmp/pr-body.txt
          echo "Reviewing PR #$PR_NUM ($BRANCH → $BASE)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Generate diff
        if: steps.pr.outputs.skip != 'true'
        id: diff
        run: |
          DIFF=$(git diff "origin/${{ steps.pr.outputs.base }}..HEAD" -- \
            ':!*.lock' ':!*.json' ':!*.svg' ':!*.png' | head -8000)
          echo "$DIFF" > /tmp/pr-diff.txt
          DIFF_LINES=$(wc -l < /tmp/pr-diff.txt)
          echo "lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"

      - name: Build review payload
        if: steps.pr.outputs.skip != 'true' && steps.diff.outputs.lines != '0'
        run: |
          python3 - "${{ steps.pr.outputs.title }}" <<'PYEOF'
          import json, sys

          title = sys.argv[1]
          diff = open("/tmp/pr-diff.txt").read()
          pr_body = open("/tmp/pr-body.txt").read()[:2000]

          system_prompt = """You are a strict code reviewer for a solo-dev infrastructure repo (Raspberry Pi cluster: Ansible, Docker Compose, Python backend, shell scripts, GitHub Actions).

          Review this PR diff with extreme rigor. Focus on:
          1. Security: secrets in code, injection risks, overly broad permissions, unsafe shell patterns
          2. Correctness: logic bugs, race conditions, missing error handling at boundaries, off-by-one
          3. Reliability: missing rollback paths, silent failures that should alert, unhandled edge cases
          4. Shell safety: unquoted variables, missing set -euo pipefail, word splitting risks
          5. Ansible/Docker: deprecated modules, privilege escalation, missing idempotency guards

          Rules:
          - Rate each finding 1-10 importance. Only report findings >= 5.
          - For each finding: file, line range, problem, suggested fix (as code).
          - If the PR is clean, say so in one line.
          - No praise, no filler, no summaries. Findings only.
          - Maximum 10 findings.

          Format each finding as:
          ### [importance/10] file:line - short title
          **Problem:** ...
          **Fix:** (code block with suggestion)"""

          payload = {
              "model": "openai/gpt-5.4",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": f"## PR: {title}\n\n{pr_body}\n\n## Diff\n\n{diff}"}
              ],
              "max_tokens": 4000,
              "temperature": 0.2
          }
          with open("/tmp/review-payload.json", "w") as f:
              json.dump(payload, f)
          PYEOF

      - name: Call GPT-5.4 via OpenRouter
        if: steps.pr.outputs.skip != 'true' && steps.diff.outputs.lines != '0'
        id: review
        run: |
          RESPONSE=$(curl -sf -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/enricoaquilina/pi-cluster" \
            -H "X-Title: pi-cluster-review" \
            -d @/tmp/review-payload.json 2>&1)

          REVIEW=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data['choices'][0]['message']['content'])
          " 2>&1) || REVIEW=""

          if [ -n "$REVIEW" ]; then
            echo "$REVIEW" > /tmp/review-result.md
            echo "has_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_review=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GPT-5.4 review returned empty response"
          fi
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        timeout-minutes: 3
        continue-on-error: true

      - name: Post review comment
        if: steps.pr.outputs.skip != 'true' && steps.review.outputs.has_review == 'true'
        run: |
          REVIEW=$(cat /tmp/review-result.md)
          gh pr comment "${{ steps.pr.outputs.pr_num }}" \
            -R "${{ github.repository }}" --body "$(cat <<EOF
          ## GPT-5.4 Strict Review

          $REVIEW

          ---
          _Auto-generated via OpenRouter GPT-5.4 — strict focus on security, correctness, reliability_
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
