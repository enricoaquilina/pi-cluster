---
name: GPT-5.4 Strict Review

on:
  workflow_run:
    workflows: ["AI PR Review"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write
  statuses: write

jobs:
  review:
    name: GPT-5.4 Deep Review
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr
        run: |
          PR_NUM="${{ github.event.workflow_run.pull_requests[0].number }}"
          # Fallback: pull_requests[] is empty for 2+ level workflow_run chains
          if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "" ]; then
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            PR_NUM=$(gh pr list -R "${{ github.repository }}" --state open \
              --json number,headRefOid --jq ".[] | select(.headRefOid == \"$HEAD_SHA\") | .number" \
              2>/dev/null | head -1)
          fi
          if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No PR associated with this workflow run"
            exit 0
          fi
          PR_STATE=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" --json state -q '.state')
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR #$PR_NUM is $PR_STATE, skipping"
            exit 0
          fi
          REVIEW_COUNT=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" --json comments \
            --jq '[.comments[] | select(.author.login == "github-actions") | select(.body | contains("GPT-5.4 Strict Review"))] | length' 2>/dev/null || echo "0")
          if [ "$REVIEW_COUNT" -ge 3 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Hard cap: $REVIEW_COUNT GPT-5.4 reviews on PR #$PR_NUM"
            exit 0
          fi
          CURRENT_SHA="${{ github.event.workflow_run.head_sha }}"
          JQ_SHA='[.comments[]
            | select(.author.login == "github-actions")
            | select(.body | contains("GPT-5.4 Strict Review"))
            | .body | capture("<!-- reviewed-sha: (?<sha>[a-f0-9]+) -->")
            | .sha] | last // empty'
          LAST_REVIEWED_SHA=$(gh pr view "$PR_NUM" \
            -R "${{ github.repository }}" --json comments \
            --jq "$JQ_SHA" 2>/dev/null || echo "")
          if [ "$LAST_REVIEWED_SHA" = "$CURRENT_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SHA $CURRENT_SHA already reviewed, skipping"
            exit 0
          fi
          PR_INFO=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" \
            --json headRefName,baseRefName,title,body,headRefOid 2>/dev/null || echo "{}")
          BRANCH=$(echo "$PR_INFO" | jq -r '.headRefName // empty')
          BASE=$(echo "$PR_INFO" | jq -r '.baseRefName // empty')
          TITLE=$(echo "$PR_INFO" | jq -r '.title // empty')
          BODY_TEXT=$(echo "$PR_INFO" | jq -r '.body // empty' | head -100)
          HEAD_SHA=$(echo "$PR_INFO" | jq -r '.headRefOid // empty')
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA:-${{ github.event.workflow_run.head_sha }}}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "$TITLE" > /tmp/pr-title.txt
          echo "$BODY_TEXT" > /tmp/pr-body.txt
          echo "Reviewing PR #$PR_NUM ($BRANCH → $BASE)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Generate diff
        if: steps.pr.outputs.skip != 'true'
        id: diff
        run: |
          PR_FILE_LIST=$(gh pr diff "${{ steps.pr.outputs.pr_num }}" \
            -R "${{ github.repository }}" --name-only 2>/dev/null || echo "")
          if [ -z "$PR_FILE_LIST" ]; then
            echo "::warning::Could not get PR file list, falling back to full branch diff"
            PR_FILE_LIST="."
          fi
          DIFF=$(git diff "origin/${{ steps.pr.outputs.base }}..HEAD" -- \
            $PR_FILE_LIST ':!*.lock' ':!*.json' ':!*.svg' ':!*.png' | head -8000)
          echo "$DIFF" > /tmp/pr-diff.txt
          DIFF_LINES=$(wc -l < /tmp/pr-diff.txt)
          echo "lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build review payload
        if: steps.pr.outputs.skip != 'true' && steps.diff.outputs.lines != '0'
        run: |
          python3 - <<'PYEOF'
          import json

          title = open("/tmp/pr-title.txt").read().strip()
          diff = open("/tmp/pr-diff.txt").read()
          pr_body = open("/tmp/pr-body.txt").read()[:2000]

          system_prompt = (
              "You are a strict code reviewer for a solo-dev infrastructure repo "
              "(Raspberry Pi cluster: Ansible, Docker Compose, Python backend, shell scripts, GitHub Actions).\n\n"
              "Codebase context:\n"
              "- Raspberry Pi cluster (Debian ARM64), 14 CI workflows with AI review pipeline\n"
              "- Ansible playbooks deploy to 4-node cluster, Python FastAPI + React frontend\n"
              "- Shell scripts use timed_ssh helper for remote commands\n"
              "- Solo-dev repo, no forks, private GitHub repo\n\n"
              "Review this PR diff with extreme rigor. Focus on:\n"
              "1. Security: secrets in code, injection risks, overly broad permissions, unsafe shell patterns\n"
              "2. Correctness: logic bugs, race conditions, missing error handling at boundaries, off-by-one\n"
              "3. Reliability: missing rollback paths, silent failures that should alert, unhandled edge cases\n"
              "4. Shell safety: unquoted variables, missing set -euo pipefail, word splitting risks\n"
              "5. Ansible/Docker: deprecated modules, privilege escalation, missing idempotency guards\n\n"
              "Rules:\n"
              "- Rate each finding 1-10 importance. Only report findings >= 8.\n"
              "- For each finding: file, line range, problem, suggested fix (as code).\n"
              "- If the PR is clean, say so in one line.\n"
              "- No praise, no filler, no summaries. Findings only.\n"
              "- Maximum 5 findings.\n\n"
              "Anti-false-positive rules:\n"
              "- The gh CLI --json output uses 'github-actions' (no [bot] suffix). Do NOT flag this as wrong.\n"
              "- continue-on-error: true on scan/lint steps is intentional (non-blocking advisory).\n"
              "- Narrow exception catches (e.g., psycopg2.Error) are intentional. Do NOT suggest broadening.\n"
              "- This is Linux-only. Do NOT flag Linux-specific commands as portability issues.\n"
              "- || echo '0' and || true patterns are intentional safety nets, not bugs.\n"
              "- 2>/dev/null on gh commands suppresses noisy stderr in CI logs.\n"
              "- head -8000 on diffs is intentional truncation for API payload limits.\n"
              "- ubuntu-latest in runs-on is correct for GitHub Actions.\n\n"
              "Format each finding as:\n"
              "### [importance/10] file:line - short title\n"
              "**Problem:** ...\n"
              "**Fix:** (code block with suggestion)"
          )

          payload = {
              "model": "openai/gpt-5.4",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": f"## PR: {title}\n\n{pr_body}\n\n## Diff\n\n{diff}"}
              ],
              "max_tokens": 4000,
              "temperature": 0.1
          }
          with open("/tmp/review-payload.json", "w") as f:
              json.dump(payload, f)
          PYEOF

      - name: Call GPT-5.4 via OpenRouter
        if: steps.pr.outputs.skip != 'true' && steps.diff.outputs.lines != '0'
        id: review
        run: |
          RESPONSE=$(curl -sf -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/enricoaquilina/pi-cluster" \
            -H "X-Title: pi-cluster-review" \
            -d @/tmp/review-payload.json 2>&1)

          REVIEW=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data['choices'][0]['message']['content'])
          " 2>&1) || REVIEW=""

          if [ -n "$REVIEW" ]; then
            echo "$REVIEW" > /tmp/review-result.md
            echo "has_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_review=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GPT-5.4 review returned empty response"
          fi
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        timeout-minutes: 3
        continue-on-error: true

      - name: Post review comment
        if: steps.pr.outputs.skip != 'true' && steps.review.outputs.has_review == 'true'
        run: |
          BODY="## GPT-5.4 Strict Review

          $(cat /tmp/review-result.md)

          ---
          _Auto-generated via OpenRouter GPT-5.4 — strict focus on security, correctness, reliability_
          <!-- reviewed-sha: ${{ steps.pr.outputs.head_sha }} -->"

          gh pr comment "${{ steps.pr.outputs.pr_num }}" \
            -R "${{ github.repository }}" --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse review verdict
        if: steps.pr.outputs.skip != 'true' && steps.review.outputs.has_review == 'true'
        id: verdict
        run: |
          CRITICAL=$(grep -cE '^\#\#\# \[(9|10)/10\]' /tmp/review-result.md 2>/dev/null || echo "0")
          echo "critical_count=$CRITICAL" >> "$GITHUB_OUTPUT"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::warning::GPT-5.4 found $CRITICAL critical findings (>=9/10)"
          fi

      - name: Post merge verdict status
        if: steps.pr.outputs.skip != 'true'
        run: |
          CRITICAL="${{ steps.verdict.outputs.critical_count }}"
          CRITICAL="${CRITICAL:-0}"
          SHA="${{ steps.pr.outputs.head_sha }}"
          if [ "$CRITICAL" -gt 0 ]; then
            STATE="failure"
            DESC="$CRITICAL critical findings (>=9/10) — must be addressed before merge"
          else
            STATE="success"
            DESC="No critical findings"
          fi
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state="$STATE" \
            -f description="$DESC" \
            -f context="AI Security Verdict"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post skip verdict
        if: steps.pr.outputs.skip == 'true' || steps.review.outputs.has_review != 'true'
        run: |
          SHA="${{ steps.pr.outputs.head_sha || github.event.workflow_run.head_sha }}"
          [ -z "$SHA" ] && exit 0
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state="success" \
            -f description="Review skipped (no code changes or API unavailable)" \
            -f context="AI Security Verdict"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PR metadata for downstream workflows
        if: steps.pr.outputs.skip != 'true'
        run: |
          echo '{"pr_number": "${{ steps.pr.outputs.pr_num }}", "branch": "${{ steps.pr.outputs.branch }}"}' > /tmp/pr-meta.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.pr.outputs.skip != 'true'
        with:
          name: gpt-review-pr-meta
          path: /tmp/pr-meta.json
          retention-days: 1
