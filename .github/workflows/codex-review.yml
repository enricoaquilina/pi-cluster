---
name: Codex Review

on:
  workflow_run:
    workflows: ["AI PR Review"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Codex Deep Review
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr
        run: |
          PR_NUM=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" \
            --jq '.pull_requests[0].number')
          if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "null" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No PR associated with this workflow run"
            exit 0
          fi
          PR_STATE=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" --json state -q '.state')
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR #$PR_NUM is $PR_STATE, skipping"
            exit 0
          fi
          BRANCH=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" --json headRefName -q '.headRefName')
          BASE=$(gh pr view "$PR_NUM" -R "${{ github.repository }}" --json baseRefName -q '.baseRefName')
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Reviewing PR #$PR_NUM ($BRANCH → $BASE)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Install and authenticate Codex
        if: steps.pr.outputs.skip != 'true'
        run: |
          npm install -g @openai/codex
          echo "$OPENAI_API_KEY" | codex login --with-api-key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run Codex review
        if: steps.pr.outputs.skip != 'true'
        id: review
        run: |
          # Disable sandbox to avoid bwrap permission issues on GH Actions runners
          REVIEW=$(codex review \
            --base "origin/${{ steps.pr.outputs.base }}" \
            -c 'sandbox=false' \
            2>&1) || REVIEW="Codex review could not complete."

          # Write to file to avoid GITHUB_OUTPUT escaping issues
          echo "$REVIEW" > /tmp/review-result.md
          if [ -n "$REVIEW" ] && [ "$REVIEW" != "Codex review could not complete." ]; then
            echo "has_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_review=false" >> "$GITHUB_OUTPUT"
          fi
        timeout-minutes: 5
        continue-on-error: true

      - name: Post review comment
        if: steps.pr.outputs.skip != 'true' && steps.review.outputs.has_review == 'true'
        run: |
          REVIEW=$(cat /tmp/review-result.md)
          BODY="## Codex Deep Review

          $REVIEW

          ---
          _Auto-generated by Codex — complements PR-Agent with focus on logic bugs_"
          gh pr comment "${{ steps.pr.outputs.pr_num }}" \
            -R "${{ github.repository }}" --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
