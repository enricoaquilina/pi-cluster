---
name: Conflict Check

on:
  schedule:
    - cron: "0 * * * *"  # hourly

permissions:
  pull-requests: write

jobs:
  check:
    name: Check for merge conflicts
    runs-on: ubuntu-latest
    steps:
      - name: Flag conflicting PRs
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          while IFS= read -r pr; do
            [ -z "$pr" ] && continue
            PR_NUM=$(echo "$pr" | jq -r '.number')
            BRANCH=$(echo "$pr" | jq -r '.headRefName')
            MERGEABLE=$(echo "$pr" | jq -r '.mergeable')

            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "PR #${PR_NUM} (${BRANCH}) has merge conflicts"

              EXISTING=$(gh pr view "$PR_NUM" -R "$REPO" \
                --json comments -q '.comments[].body' 2>/dev/null \
                | grep -c "Merge conflict detected" || echo "0")

              if [ "${EXISTING:-0}" -eq 0 ]; then
                BODY="**Merge conflict detected**"
                BODY+=$'\n\n'"This PR has conflicts with master that need to be resolved before it can be merged."
                BODY+=$'\n\n'"To fix: rebase onto latest master and force-push."
                BODY+=$'\n\n'"_Auto-detected by merge conflict checker_"
                gh pr comment "$PR_NUM" -R "$REPO" --body "$BODY"
                gh pr edit "$PR_NUM" -R "$REPO" \
                  --add-label "conflict" 2>/dev/null || true
                echo "Commented on PR #${PR_NUM}"
              else
                echo "Already commented on PR #${PR_NUM}, skipping"
              fi
            fi
          done < <(gh pr list -R "$REPO" --state open --json number,headRefName,mergeable -q '.[]')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
