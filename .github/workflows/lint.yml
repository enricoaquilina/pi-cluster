---
name: Lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          ansible-galaxy collection install community.general ansible.posix

      - name: Symlink test secrets for vault playbooks
        run: |
          mkdir -p secrets
          ln -sf "$(pwd)/tests/secrets/vpn.yml" secrets/vpn.yml
          ln -sf "$(pwd)/tests/secrets/pihole.yml" secrets/pihole.yml
          ln -sf "$(pwd)/tests/secrets/openclaw.yml" secrets/openclaw.yml
          ln -sf "$(pwd)/tests/secrets/monitoring.yml" secrets/monitoring.yml

      - name: Run ansible-lint
        run: ansible-lint
        env:
          ANSIBLE_VAULT_PASSWORD_FILE: tests/vault-password.txt

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          severity: warning

      - name: Run ShellCheck on file assets
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: files
          severity: warning

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python scripts
        run: ruff check scripts/ --select E,F,W --ignore E501

      - name: Lint Mission Control backend
        run: ruff check mission-control/backend/ --select E,F,W --ignore E501
        continue-on-error: true

  script-smoke:
    name: Script Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          failed=0
          for script in scripts/*.sh scripts/lib/*.sh; do
            [ -f "$script" ] || continue
            echo "=== $script ==="
            if ! bash -n "$script"; then
              failed=1
            fi
          done
          exit $failed

      - name: Python compile check
        run: |
          failed=0
          for script in scripts/*.py; do
            [ -f "$script" ] || continue
            echo "=== $script ==="
            if ! python3 -c "compile(open('$script').read(), '$script', 'exec')"; then
              failed=1
            fi
          done
          exit $failed

      - name: Bash strict mode check
        run: |
          failed=0
          for f in scripts/*.sh; do
            [ -f "$f" ] || continue
            if ! head -25 "$f" | grep -q 'set -.*u.*o pipefail'; then
              echo "WARN: $f missing strict mode (set -uo pipefail)"
              failed=1
            fi
          done
          exit $failed

      - name: Duplicate function detection
        run: |
          failed=0
          for f in scripts/*.sh; do
            [ -f "$f" ] || continue
            DUPES=$(grep -oP '^\w+\(\)' "$f" 2>/dev/null | sort | uniq -d || true)
            if [ -n "$DUPES" ]; then
              echo "ERROR: Duplicate functions in $f: $DUPES"
              failed=1
            fi
          done
          exit $failed

      - name: Timeout + shell function misuse
        run: |
          failed=0
          for f in scripts/*.sh; do
            [ -f "$f" ] || continue
            # timeout cannot call shell functions (uses execvp, exit 127)
            # Allow timed_ssh which is designed for this purpose
            if grep -nP 'timeout\s+\d+\s+(?!ssh\b|docker\b|curl\b|bash\b|python3?\b|node\b|timed_ssh\b)\w+' "$f" 2>/dev/null | grep -v '#'; then
              echo "ERROR: $f uses timeout with a shell function (use timed_ssh or inline the command)"
              failed=1
            fi
          done
          exit $failed

      - name: Docker Compose syntax check
        run: |
          failed=0
          for f in $(find . -name 'docker-compose*.yml' -not -path './.claude/*' -not -path './.git/*'); do
            echo "=== $f ==="
            if ! docker compose -f "$f" config --quiet 2>/dev/null; then
              echo "ERROR: Invalid docker-compose file: $f"
              failed=1
            fi
          done
          exit $failed

  gitleaks:
    name: Credential Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
