---
name: Lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          ansible-galaxy collection install community.general ansible.posix

      - name: Symlink test secrets for vault playbooks
        run: |
          ln -sf "$(pwd)/tests/secrets/vpn.yml" secrets/vpn.yml
          ln -sf "$(pwd)/tests/secrets/pihole.yml" secrets/pihole.yml
          ln -sf "$(pwd)/tests/secrets/openclaw.yml" secrets/openclaw.yml
          ln -sf "$(pwd)/tests/secrets/monitoring.yml" secrets/monitoring.yml

      - name: Run ansible-lint
        run: ansible-lint
        env:
          ANSIBLE_VAULT_PASSWORD_FILE: tests/vault-password.txt

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          severity: warning

      - name: Run ShellCheck on file assets
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: files
          severity: warning
