---
name: Lint

on:
  push:
    branches: [master, main]
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - '.yamllint.yml'
      - '.ansible-lint'
      - 'playbooks/**'
      - 'templates/**'
      - 'vars/**'
      - 'inventory/**'
      - 'scripts/**'
      - 'files/**'
      - 'mission-control/backend/**/*.py'
      - 'life-automation/**/*.py'
      - 'docker-compose*.yml'
      - 'ruff.toml'
      - '.pre-commit-config.yaml'
      - '.gitleaksignore'
      - '.github/**'
  pull_request:
    branches: [master, main]
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - '.yamllint.yml'
      - '.ansible-lint'
      - 'playbooks/**'
      - 'templates/**'
      - 'vars/**'
      - 'inventory/**'
      - 'scripts/**'
      - 'files/**'
      - 'mission-control/backend/**/*.py'
      - 'life-automation/**/*.py'
      - 'docker-compose*.yml'
      - 'ruff.toml'
      - '.pre-commit-config.yaml'
      - '.gitleaksignore'
      - '.github/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          ansible-galaxy collection install -r requirements-collections.yml

      - name: Symlink test secrets for vault playbooks
        run: |
          mkdir -p secrets
          ln -sf "$(pwd)/tests/secrets/vpn.yml" secrets/vpn.yml
          ln -sf "$(pwd)/tests/secrets/pihole.yml" secrets/pihole.yml
          ln -sf "$(pwd)/tests/secrets/openclaw.yml" secrets/openclaw.yml
          ln -sf "$(pwd)/tests/secrets/monitoring.yml" secrets/monitoring.yml

      - name: Run ansible-lint
        run: ansible-lint
        env:
          ANSIBLE_VAULT_PASSWORD_FILE: tests/vault-password.txt

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          severity: warning

      - name: Run ShellCheck on file assets
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: files
          severity: warning

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.8.0

      - name: Lint Python scripts
        run: ruff check scripts/

      - name: Lint Mission Control backend
        run: ruff check mission-control/backend/
        continue-on-error: true

  script-smoke:
    name: Script Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          failed=0
          while IFS= read -r script; do
            echo "=== $script ==="
            if ! bash -n "$script"; then
              failed=1
            fi
          done < <(find scripts/ -name '*.sh' -type f)
          exit $failed

      - name: Python compile check
        run: |
          failed=0
          for script in scripts/*.py; do
            [ -f "$script" ] || continue
            echo "=== $script ==="
            if ! python3 -c "compile(open('$script').read(), '$script', 'exec')"; then
              failed=1
            fi
          done
          exit $failed

      - name: Bash strict mode check
        run: |
          failed=0
          while IFS= read -r f; do
            if ! head -25 "$f" | grep -q 'set -.*u.*o pipefail'; then
              echo "WARN: $f missing strict mode (set -uo pipefail)"
              failed=1
            fi
          done < <(find scripts/ -maxdepth 1 -name '*.sh' -type f)
          exit $failed

      - name: Duplicate function detection
        run: |
          failed=0
          for f in scripts/*.sh; do
            [ -f "$f" ] || continue
            DUPES=$(grep -oP '^\w+\(\)' "$f" 2>/dev/null | sort | uniq -d || true)
            if [ -n "$DUPES" ]; then
              echo "ERROR: Duplicate functions in $f: $DUPES"
              failed=1
            fi
          done
          exit $failed

      - name: Timeout + shell function misuse
        run: |
          failed=0
          for f in scripts/*.sh; do
            [ -f "$f" ] || continue
            # timeout cannot call shell functions (uses execvp, exit 127)
            # Allow known binaries and timed_ssh helper
            allowed='ssh|docker|curl|bash|python3?|node|timed_ssh'
            allowed="$allowed|stat|find|ls|df|du|cat|head|tail"
            allowed="$allowed|wc|mkdir|touch|cp|mv|rm|chmod|chown"
            if grep -nP "timeout\s+\d+\s+(?!($allowed)\b)\w+" "$f" \
                2>/dev/null | grep -v '#'; then
              echo "ERROR: $f uses timeout with a shell function (use timed_ssh or inline the command)"
              failed=1
            fi
          done
          exit $failed

      - name: Docker Compose syntax check
        run: |
          failed=0
          for f in $(find . -name 'docker-compose*.yml' -not -path './.claude/*' -not -path './.git/*'); do
            echo "=== $f ==="
            if ! docker compose -f "$f" config --quiet 2>/dev/null; then
              echo "ERROR: Invalid docker-compose file: $f"
              failed=1
            fi
          done
          exit $failed

      - name: CI config quality tests
        run: bash tests/test_ci_config.sh

      - name: Test harness self-test
        run: bash tests/test_harness.sh

      - name: Smoke check unit tests (40 tests)
        run: bash tests/test_smoke_quick_wins.sh

      - name: Cluster watchdog tests (12 tests)
        run: bash tests/test_cluster_watchdog.sh

      - name: Node check tests (10 tests)
        run: bash tests/test_smoke_node_check.sh

  gitleaks:
    name: Credential Scan
    runs-on: ubuntu-latest
    # gitleaks-action@v2 queries /repos/{}/pulls/{}/commits which requires
    # pull-requests: read. Without this the action fails with HTTP 403
    # "Resource not accessible by integration".
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
