---
name: Mission Control Tests

on:
  push:
    branches: [master, main]
    paths:
      - 'mission-control/**'
  pull_request:
    branches: [master, main]
    paths:
      - 'mission-control/**'
  merge_group:

jobs:
  test:
    name: MC Backend Tests
    runs-on: ubuntu-latest
    env:
      TEST_DB_PASS: ${{ secrets.TEST_DB_PASSWORD || 'ci-only-not-prod' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: missioncontrol
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'ci-only-not-prod' }}
          POSTGRES_DB: missioncontrol
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'mission-control/backend/requirements*.txt'

      - name: Install dependencies
        run: |
          cd mission-control/backend
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://missioncontrol:${{ env.TEST_DB_PASS }}@localhost:5432/missioncontrol
          API_KEY: test-api-key
          OPENCLAW_DIR: /tmp
          POLYBOT_DATA_DIR: /tmp
        run: |
          cd mission-control/backend
          python -m pytest tests/ -v --tb=short
