---
name: Post-Merge Deploy Notify

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  notify:
    name: Deploy notification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Notify Telegram of merge
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.event.head_commit.id }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.username }}
        run: |
          set -euo pipefail

          SHORT="${COMMIT_SHA:0:7}"
          TITLE=$(echo "$COMMIT_MSG" | head -1)

          # Skip docs-only commits
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          DOCS_ONLY=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|docs/*|LICENSE|.gitignore) ;;
              *) DOCS_ONLY=false; break ;;
            esac
          done <<< "$CHANGED"

          if [ "$DOCS_ONLY" = "true" ]; then
            echo "Docs-only commit, skipping notification"
            exit 0
          fi

          TEXT="📦 *Merged to master*
          \`${SHORT}\` ${TITLE}
          _by ${COMMIT_AUTHOR} — deploy in ~5min_"

          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            curl -sf -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${TEXT}" \
              -d "parse_mode=Markdown" > /dev/null 2>&1 \
              || echo "::warning::Telegram notification failed"
          fi
