---
name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.py'
              - '**/*.sh'
              - '**/*.yml'
              - '**/*.yaml'
              - '**/*.j2'
              - '**/*.json'
              - '**/*.toml'
              - '**/*.cfg'
              - '**/*.ini'
              - '**/*.conf'
              - '**/*.html'
              - '**/*.js'
              - '**/*.css'
              - 'Dockerfile*'
              - 'docker-compose*'
              - 'Makefile'
              - 'playbooks/**'
              - 'templates/**'
              - 'scripts/**'
              - 'vars/**'
              - 'inventory/**'
              - 'files/**'
              - 'hooks/**'
              - 'systemd/**'

  review:
    name: AI Code Review
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: qodo-ai/pr-agent@d82f7d3e696cd00822694aaa3096265d3889f3f1 # v0.34
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER__KEY: ${{ secrets.OPENROUTER_API_KEY }}
          github_action_config.auto_improve: "true"

  review-gate:
    name: Review Gate
    if: always()
    needs: [review]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate review results
        run: |
          if [[ "${{ needs.review.result }}" == "failure" ]]; then
            echo "::error::AI review failed"
            exit 1
          fi
          if [[ "${{ needs.review.result }}" == "cancelled" ]]; then
            echo "::error::AI review was cancelled"
            exit 1
          fi
          echo "Review passed (or skipped for docs-only PR)"
