---
name: PR Size Check

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  size-check:
    name: PR size advisory
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size and type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          PR_DATA=$(gh pr view "$PR_NUM" -R "$REPO" \
            --json additions,deletions,title)
          ADDITIONS=$(echo "$PR_DATA" | jq -r '.additions')
          DELETIONS=$(echo "$PR_DATA" | jq -r '.deletions')
          TITLE=$(echo "$PR_DATA" | jq -r '.title')
          ADDITIONS=${ADDITIONS:-0}
          DELETIONS=${DELETIONS:-0}
          NET=$((ADDITIONS - DELETIONS))

          WARNING=""
          if [ "$ADDITIONS" -gt 500 ]; then
            WARNING="Large PR: **+${ADDITIONS}** lines. Consider splitting into smaller PRs."
          fi

          if echo "$TITLE" | grep -q '^fix' && [ "$NET" -gt 200 ]; then
            SEP=""
            [ -n "$WARNING" ] && SEP=$'\n'
            WARNING="${WARNING}${SEP}Labeled \`fix:\` but **+${NET}** net lines — should this be \`feat:\`?"
          fi

          if [ -n "$WARNING" ]; then
            BODY="⚠️ **PR Size Check**"
            BODY+=$'\n\n'"${WARNING}"
            BODY+=$'\n\n'"_This is advisory, not blocking._"
            gh pr comment "$PR_NUM" -R "$REPO" --body "$BODY"
          fi
