---
name: Secret Rotation Reminder

on:
  schedule:
    - cron: "0 9 1 1,4,7,10 *"  # 1st of Jan/Apr/Jul/Oct at 09:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  remind:
    name: Create rotation reminder
    runs-on: ubuntu-latest
    steps:
      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Quarterly secret rotation — $(date +%Y-Q$(( ($(date +%-m) - 1) / 3 + 1 )))" \
            --body "$(cat <<'BODY'
          ## Quarterly Secret Rotation Checklist

          - [ ] Rotate Telegram bot token (`secrets/monitoring.yml`)
          - [ ] Rotate MC API key (`secrets/openclaw.yml`)
          - [ ] Rotate OpenRouter API key
          - [ ] Rotate Cloudflare tunnel token
          - [ ] Rekey Ansible vault: `ansible-vault rekey secrets/*.yml`
          - [ ] Run rotation playbook: `make rotate-secrets`
          - [ ] Verify services healthy: `system-smoke-test.sh`

          Run from master: `ansible-playbook playbooks/secret-rotation.yml --vault-password-file secrets-vault-password`
          BODY
          )" \
            --label "maintenance"
