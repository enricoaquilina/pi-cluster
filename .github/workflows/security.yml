---
name: Security Scan

on:
  pull_request:
    branches: [master, main]

jobs:
  trivy-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build OpenClaw image
        run: |
          docker build -t openclaw-scan:local \
            -f openclaw/Dockerfile \
            openclaw/

      - name: Run Trivy on built image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: openclaw-scan:local
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          output: trivy-results.txt

      - name: Run Trivy on mongo:7
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: mongo:7
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-mongo.txt

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Security Scan Results\n\n';
            for (const [label, file] of [['OpenClaw Image', 'trivy-results.txt'], ['MongoDB Image', 'trivy-mongo.txt']]) {
              if (fs.existsSync(file)) {
                const content = fs.readFileSync(file, 'utf8').trim();
                if (content) {
                  body += `### ${label}\n\`\`\`\n${content.slice(0, 3000)}\n\`\`\`\n\n`;
                } else {
                  body += `### ${label}\nNo CRITICAL/HIGH vulnerabilities found.\n\n`;
                }
              }
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  security-audit:
    name: Security Best Practices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no secrets in tracked files
        run: |
          if grep -rn --include='*.py' --include='*.sh' --include='*.yml' --include='*.yaml' \
            -E '(TELEGRAM_BOT_TOKEN|MC_API_KEY|OPENROUTER_API_KEY)\s*=\s*"?[a-zA-Z0-9_:-]{20,}' \
            scripts/ templates/ playbooks/ .github/ 2>/dev/null | grep -v '.env.cluster' | grep -v 'os.environ.get'; then
            echo "ERROR: Hardcoded secrets found in tracked files"
            exit 1
          fi
          echo "OK: No hardcoded secrets in tracked files"
