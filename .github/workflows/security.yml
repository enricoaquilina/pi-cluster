---
name: Security Scan

on:
  pull_request:
    branches: [master, main]
    paths:
      - 'openclaw/**'
      - 'mission-control/**'
      - 'docker-compose*.yml'
      - 'scripts/**'
      - 'playbooks/**'
      - 'templates/**'
      - '.github/**'
      - '**/*.py'
      - '**/*.sh'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  trivy-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_TOKEN_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true  # no-op until DOCKERHUB_TOKEN secrets are added

      - name: Scan Dockerfile for misconfigurations
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: openclaw/
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          output: trivy-config.txt
        continue-on-error: true

      - name: Scan repo filesystem for secrets and vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          output: trivy-fs.txt

      - name: Run Trivy on mongo:7
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: mongo:7
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-mongo.txt

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let body = '## Security Scan Results\n\n';
            for (const [label, file] of [
              ['Dockerfile Config', 'trivy-config.txt'],
              ['Filesystem Scan', 'trivy-fs.txt'],
              ['MongoDB Image', 'trivy-mongo.txt'],
            ]) {
              if (fs.existsSync(file)) {
                const content = fs.readFileSync(file, 'utf8').trim();
                if (content) {
                  body += `### ${label}\n\`\`\`\n${content.slice(0, 3000)}\n\`\`\`\n\n`;
                } else {
                  body += `### ${label}\nNo CRITICAL/HIGH issues found.\n\n`;
                }
              }
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Report scan summary
        run: |
          for f in trivy-config.txt trivy-fs.txt trivy-mongo.txt; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              echo "Findings in $f (see PR comment for details)"
            else
              echo "No issues in ${f:-}"
            fi
          done

  security-audit:
    name: Security Best Practices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check no secrets in tracked files
        run: |
          if grep -rn --include='*.py' --include='*.sh' --include='*.yml' --include='*.yaml' \
            -E '(TELEGRAM_BOT_TOKEN|MC_API_KEY|OPENROUTER_API_KEY)\s*=\s*"?[a-zA-Z0-9_:-]{20,}' \
            scripts/ templates/ playbooks/ .github/ 2>/dev/null | grep -v '.env.cluster' | grep -v 'os.environ.get'; then
            echo "ERROR: Hardcoded secrets found in tracked files"
            exit 1
          fi
          echo "OK: No hardcoded secrets in tracked files"
