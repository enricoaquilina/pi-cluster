---
name: Validate

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  ANSIBLE_VAULT_PASSWORD_FILE: tests/vault-password.txt

jobs:
  syntax-check:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and collections
        run: |
          pip install ansible-core
          ansible-galaxy collection install community.general ansible.posix

      - name: Symlink test secrets for vault playbooks
        run: |
          mkdir -p secrets
          ln -sf "$(pwd)/tests/secrets/vpn.yml" secrets/vpn.yml
          ln -sf "$(pwd)/tests/secrets/pihole.yml" secrets/pihole.yml
          ln -sf "$(pwd)/tests/secrets/openclaw.yml" secrets/openclaw.yml
          ln -sf "$(pwd)/tests/secrets/monitoring.yml" secrets/monitoring.yml

      - name: Syntax check all playbooks
        run: |
          failed=0
          for playbook in playbooks/*.yml; do
            echo "--- Checking $playbook ---"
            if ! ansible-playbook --syntax-check -i tests/inventory.yml "$playbook"; then
              failed=1
            fi
          done
          exit $failed

  template-render:
    name: Template Rendering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jinja2 ansible-core

      - name: Render and validate templates
        run: python tests/test_templates.py

      - name: Validate openclaw config template
        run: |
          if [ -f scripts/render-openclaw-config.sh ] && [ -f configs/openclaw/openclaw.json.template ]; then
            echo "TELEGRAM_BOT_TOKEN=test-token-ci" > /tmp/test-env
            sudo apt-get install -y -qq gettext-base >/dev/null 2>&1 || true
            bash scripts/render-openclaw-config.sh \
              --template configs/openclaw/openclaw.json.template \
              --env /tmp/test-env \
              --no-validate \
              -o /tmp/rendered-config.json 2>&1 || true
            python3 -c "import json; json.load(open('/tmp/rendered-config.json')); print('openclaw config: valid JSON')"
          fi

  dry-run:
    name: Ansible Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and collections
        run: |
          pip install ansible-core
          ansible-galaxy collection install community.general ansible.posix

      - name: Symlink test secrets
        run: |
          mkdir -p secrets
          ln -sf "$(pwd)/tests/secrets/vpn.yml" secrets/vpn.yml
          ln -sf "$(pwd)/tests/secrets/pihole.yml" secrets/pihole.yml
          ln -sf "$(pwd)/tests/secrets/openclaw.yml" secrets/openclaw.yml
          ln -sf "$(pwd)/tests/secrets/monitoring.yml" secrets/monitoring.yml

      - name: Dry-run openclaw-nodes playbook
        run: >
          ansible-playbook playbooks/openclaw-nodes.yml
          -i tests/inventory.yml
          --check --diff
          --connection local
        continue-on-error: true

      - name: Dry-run openclaw-monitoring playbook
        run: >
          ansible-playbook playbooks/openclaw-monitoring.yml
          -i tests/inventory.yml
          --check --diff
          --connection local
        continue-on-error: true

  python-tests:
    name: Mission Control Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL
        run: |
          TEST_PASS=$(openssl rand -hex 16)
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER missioncontrol WITH PASSWORD '${TEST_PASS}';"
          sudo -u postgres psql -c "CREATE DATABASE missioncontrol OWNER missioncontrol;"
          echo "TEST_DB_PASS=${TEST_PASS}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r mission-control/backend/requirements.txt
          pip install -r mission-control/backend/requirements-test.txt

      - name: Run MC backend tests
        run: pytest mission-control/backend/tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://missioncontrol:${{ env.TEST_DB_PASS }}@localhost:5432/missioncontrol
