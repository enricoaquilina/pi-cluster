extends: default

rules:
  line-length:
    max: 200
    level: error
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false
  comments:
    min-spaces-from-content: 1
  comments-indentation: false
  braces:
    max-spaces-inside: 1
  document-start: disable
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true

ignore:
  - .git/
  - .claude/
  - ansible/
  - openclaw/n8n-workflows/
  - secrets/
