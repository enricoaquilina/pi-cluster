all:
  children:
    masters:
      hosts:
        master:
          ansible_host: 127.0.0.1
          ansible_connection: local
    slaves:
      hosts:
        slave0:
          ansible_host: 192.168.0.3
        slave1:
          ansible_host: 192.168.0.4
    vpn:
      hosts:
        master:
          keepsolid_private_key: "{{ vault_master_keepsolid_key }}"
          keepsolid_server_pubkey: "REPLACE_WITH_BELGIUM_SERVER_PUBKEY"
          keepsolid_endpoint: "REPLACE_WITH_BELGIUM_ENDPOINT"
          keepsolid_client_ip: "REPLACE_WITH_BELGIUM_CLIENT_IP"
        slave0:
          keepsolid_private_key: "{{ vault_slave0_keepsolid_key }}"
          keepsolid_server_pubkey: "REPLACE_WITH_HK_SERVER_PUBKEY"
          keepsolid_endpoint: "REPLACE_WITH_HK_ENDPOINT"
          keepsolid_client_ip: "REPLACE_WITH_HK_CLIENT_IP"
    cluster:
      children:
        masters:
        slaves:
