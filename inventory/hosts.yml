all:
  children:
    masters:
      hosts:
        master:
          ansible_host: 127.0.0.1
          ansible_connection: local
    slaves:
      hosts:
        slave0:
          ansible_host: 100.65.188.85
          nfs_server_override: 100.85.234.128
        slave1:
          ansible_host: 192.168.0.4
        heavy:
          ansible_host: 192.168.0.5
    vpn:
      hosts:
        master:
          keepsolid_private_key: "{{ vault_master_keepsolid_key }}"
          keepsolid_server_pubkey: "REPLACE_WITH_BELGIUM_SERVER_PUBKEY"
          keepsolid_endpoint: "REPLACE_WITH_BELGIUM_ENDPOINT"
          keepsolid_client_ip: "REPLACE_WITH_BELGIUM_CLIENT_IP"
        slave0:
          keepsolid_private_key: "{{ vault_slave0_keepsolid_key }}"
          keepsolid_server_pubkey: "REPLACE_WITH_HK_SERVER_PUBKEY"
          keepsolid_endpoint: "REPLACE_WITH_HK_ENDPOINT"
          keepsolid_client_ip: "REPLACE_WITH_HK_CLIENT_IP"
    pihole:
      hosts:
        slave0:
          keepalived_state: MASTER
          keepalived_priority: 150
          gravity_sync_remote_host: "192.168.0.4"
        slave1:
          keepalived_state: BACKUP
          keepalived_priority: 100
          gravity_sync_remote_host: "192.168.0.3"
    openclaw_nodes:
      hosts:
        master:
          openclaw_node_name: control
          openclaw_node_role: orchestrator
          openclaw_max_concurrent: 5
        slave0:
          openclaw_node_name: build
          openclaw_node_role: coding
          openclaw_max_concurrent: 5
        slave1:
          openclaw_node_name: light
          openclaw_node_role: research
          openclaw_max_concurrent: 3
          openclaw_node_memory_max: 1200M
          openclaw_node_max_old_space: 768
        heavy:
          openclaw_node_name: heavy
          openclaw_node_role: compute
          openclaw_max_concurrent: 10
          openclaw_agent_script: /home/enrico/pi-cluster/scripts/openclaw-node-agent.py
    cluster:
      children:
        masters:
        slaves:
        openclaw_nodes:
