# Weekly maintenance configuration.
# Sourced by weekly-maintenance.sh — all values are bash variables.

# Model per mode (change without editing script)
WEEKLY_MODEL_DAILY="sonnet"
WEEKLY_MODEL_FULL="sonnet"

# Timeouts (seconds)
WEEKLY_CLAUDE_TIMEOUT=300
WEEKLY_RETRY_DELAY=60
WEEKLY_MAX_RETRIES=1

# Notifications — credentials loaded from .env.cluster
WEEKLY_NOTIFY_ON_FAILURE=true

# Scheduled time (informational — actual schedule in systemd timer)
WEEKLY_SCHEDULE="05:43"
