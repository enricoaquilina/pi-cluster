<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard — Mission Control</title>
<script type="importmap">
{
  "imports": {
    "preact": "https://esm.sh/preact@10.25.4",
    "preact/hooks": "https://esm.sh/preact@10.25.4/hooks",
    "htm": "https://esm.sh/htm@3.1.1",
    "chart.js": "https://esm.sh/chart.js@4.4.7",
    "chart.js/auto": "https://esm.sh/chart.js@4.4.7/auto"
  }
}
</script>
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1e293b;
    --border: #1e3a5f; --text: #e2e8f0; --muted: #8892a4;
    --accent: #38bdf8; --green: #22c55e; --yellow: #eab308;
    --red: #ef4444; --orange: #f97316; --purple: #a855f7;
    --glass-bg: rgba(17, 24, 39, 0.7); --glass-border: rgba(56, 189, 248, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(56,189,248,0.05) 0%, transparent 60%);
  }

  /* Header */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem; display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 0.5rem;
    backdrop-filter: blur(12px);
  }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  .header-left a { color: var(--muted); text-decoration: none; font-size: 0.85rem; transition: color 0.15s; }
  .header-left a:hover { color: var(--accent); }
  .header h1 { font-size: 1.2rem; font-weight: 700; color: var(--text); }
  .header h1 span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 1rem; font-size: 0.8rem; color: var(--muted); }
  .header-right a { color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 0.3rem 0.7rem; border-radius: 6px; transition: all 0.15s; }
  .header-right a:hover { color: var(--accent); border-color: var(--accent); }

  /* Tab bar */
  .tab-bar { display: flex; gap: 0.25rem; padding: 0.5rem 1.5rem; background: var(--surface); border-bottom: 1px solid rgba(30,58,95,0.5); }
  .tab-btn {
    background: transparent; color: var(--muted); border: 1px solid transparent;
    border-radius: 6px; padding: 0.4rem 0.9rem; font-size: 0.82rem;
    cursor: pointer; font-weight: 600; transition: all 0.15s; font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface2); }
  .tab-btn.active { color: var(--accent); background: rgba(56,189,248,0.1); border-color: var(--accent); }

  /* Content */
  .content { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

  /* Metric Cards */
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .metric-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 12px; padding: 1.2rem; backdrop-filter: blur(12px);
    animation: fadeUp 0.4s ease-out both;
  }
  .metric-card.profit { border-color: rgba(34,197,94,0.2); box-shadow: 0 0 20px rgba(34,197,94,0.08); }
  .metric-card.loss { border-color: rgba(239,68,68,0.2); box-shadow: 0 0 20px rgba(239,68,68,0.08); }
  .metric-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
  .metric-value {
    font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }
  .metric-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-yellow { color: var(--yellow); }
  .text-accent { color: var(--accent); }
  .text-muted { color: var(--muted); }

  /* Bot Status Cards */
  .bot-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .bot-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 12px; padding: 1.2rem; backdrop-filter: blur(12px);
    animation: fadeUp 0.5s ease-out both;
  }
  .bot-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
  .bot-card-title { font-weight: 700; font-size: 0.95rem; }
  .bot-card-stat { font-size: 0.85rem; color: var(--muted); margin-top: 0.3rem; }
  .bot-card-stat strong { color: var(--text); font-family: 'SF Mono', monospace; font-variant-numeric: tabular-nums; }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.72rem;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .badge-paper { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-live { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-on { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-off { background: rgba(136,146,164,0.15); color: var(--muted); }
  .badge-pending { background: rgba(56,189,248,0.15); color: var(--accent); }
  .badge-open { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-locked { background: rgba(168,85,247,0.15); color: var(--purple); }
  .badge-partial { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge-settled { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-cancelled { background: rgba(136,146,164,0.15); color: var(--muted); }

  /* Pulse dot */
  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    animation: pulse 2s infinite;
  }
  .pulse-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .pulse-dot.red { background: var(--red); }
  .pulse-dot.gray { background: var(--muted); }

  /* Tables */
  .table-wrap { overflow-x: auto; margin-bottom: 1.5rem; border-radius: 10px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th {
    background: var(--surface2); color: var(--muted); padding: 0.6rem 0.8rem;
    text-align: left; font-weight: 600; text-transform: uppercase; font-size: 0.72rem;
    letter-spacing: 0.04em; border-bottom: 1px solid var(--border); cursor: pointer;
    user-select: none; white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  thead th .sort-arrow { margin-left: 0.3rem; font-size: 0.65rem; }
  tbody td {
    padding: 0.55rem 0.8rem; border-bottom: 1px solid rgba(30,58,95,0.3);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  tbody tr:hover { background: rgba(56,189,248,0.04); }
  td.num { font-family: 'SF Mono', monospace; text-align: right; }
  td.market { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Pagination */
  .pagination { display: flex; gap: 0.5rem; align-items: center; justify-content: center; margin: 1rem 0; }
  .pagination button {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.35rem 0.8rem; cursor: pointer; font-size: 0.8rem;
    font-family: inherit; transition: all 0.15s;
  }
  .pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination span { color: var(--muted); font-size: 0.8rem; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .filter-bar select, .filter-bar input {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.4rem 0.7rem; font-size: 0.82rem; font-family: inherit;
  }
  .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: var(--accent); }

  /* Chart containers */
  .chart-container { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; }
  .chart-container canvas { max-height: 300px; }
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }

  /* Section headers */
  .section-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.8rem; color: var(--text); }

  /* Activity feed */
  .activity-feed { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1rem; }
  .activity-item {
    display: flex; gap: 0.8rem; align-items: flex-start; padding: 0.5rem 0;
    border-bottom: 1px solid rgba(30,58,95,0.2); font-size: 0.82rem;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-time { color: var(--muted); font-family: 'SF Mono', monospace; font-size: 0.75rem; min-width: 55px; }
  .activity-icon { font-size: 0.9rem; }
  .activity-text { color: var(--text); flex: 1; }

  /* Skeleton loading */
  .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
  .skeleton-line { height: 1rem; margin-bottom: 0.5rem; }
  .skeleton-card { height: 100px; }

  /* Config card */
  .config-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem;
  }
  .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.6rem; }
  .config-item { font-size: 0.82rem; }
  .config-item .label { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; }
  .config-item .value { font-family: 'SF Mono', monospace; font-weight: 600; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes flash {
    0%, 100% { background: transparent; }
    50% { background: rgba(56,189,248,0.1); }
  }
  .value-changed { animation: flash 0.6s ease-out; }

  /* Empty state */
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 0.5rem 1rem; }
    .content { padding: 1rem; }
    .metric-grid { grid-template-columns: repeat(2, 1fr); }
    .bot-grid { grid-template-columns: 1fr; }
    .chart-row { grid-template-columns: 1fr; }
    .tab-bar { overflow-x: auto; padding: 0.5rem 1rem; }
    td:first-child, th:first-child { position: sticky; left: 0; background: var(--surface); z-index: 1; }
  }
  @media (max-width: 480px) {
    .metric-grid { grid-template-columns: 1fr; }
    .header-left { flex-wrap: wrap; }
  }
</style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/trading/app.js"></script>
</body>
</html>
