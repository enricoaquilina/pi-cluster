---
- name: Common baseline configuration
  hosts: cluster
  become: true
  tasks:
    - name: Set timezone to Europe/Malta
      community.general.timezone:
        name: Europe/Malta

    - name: Ensure common packages are installed
      apt:
        name:
          - vim
          - htop
          - curl
          - dnsutils
          - git
          - rsync
        state: present
        cache_valid_time: 3600

    - name: Ensure NTP is enabled
      systemd:
        name: systemd-timesyncd
        enabled: true
        state: started

    - name: Populate SSH known_hosts for cluster nodes
      known_hosts:
        name: "{{ item }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 ' + item + ' 2>/dev/null') }}"
        state: present
      loop:
        - 192.168.0.3
        - 192.168.0.4
        - 192.168.0.5
        - 192.168.0.22
      delegate_to: localhost
      run_once: true
      become: false
