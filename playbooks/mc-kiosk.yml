---
- name: Mission Control kiosk display
  hosts: master
  become: false
  tasks:
    - name: Remove old autostart desktop file
      file:
        path: /home/enrico/.config/autostart/mc-kiosk.desktop
        state: absent

    - name: Ensure systemd user directory exists
      file:
        path: /home/enrico/.config/systemd/user
        state: directory
        mode: '0755'

    - name: Deploy MC kiosk systemd service
      copy:
        src: ../templates/mc-kiosk.service
        dest: /home/enrico/.config/systemd/user/mc-kiosk.service
        mode: '0644'
      register: service_file

    - name: Reload systemd user daemon
      systemd:
        daemon_reload: true
        scope: user
      environment:
        XDG_RUNTIME_DIR: /run/user/1000
      when: service_file.changed

    - name: Enable and start MC kiosk service
      systemd:
        name: mc-kiosk
        enabled: true
        state: started
        scope: user
      environment:
        XDG_RUNTIME_DIR: /run/user/1000
