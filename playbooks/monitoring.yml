---
# Deploy monitoring stack: node_exporter on all nodes, VictoriaMetrics + Grafana on master
# Monitoring runs on master so it survives heavy outages.
# Usage: ansible-playbook playbooks/monitoring.yml

- name: Deploy node_exporter on all nodes
  hosts: all
  become: true
  tasks:
    - name: Install node_exporter
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
      when: ansible_os_family == "Debian"

    - name: Configure node_exporter collectors
      ansible.builtin.copy:
        dest: /etc/default/prometheus-node-exporter
        content: |
          ARGS="--collector.disable-defaults --collector.cpu --collector.meminfo --collector.diskstats --collector.filesystem --collector.hwmon --collector.nfs --collector.netdev --collector.loadavg"
        mode: "0644"
      notify: restart node-exporter

    - name: Ensure node_exporter running
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        state: started
        enabled: true

    - name: Allow node_exporter from cluster subnet
      community.general.ufw:
        rule: allow
        port: "9100"
        proto: tcp
        from_ip: 192.168.0.0/24
        comment: node-exporter for monitoring

  handlers:
    - name: restart node-exporter
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        state: restarted

- name: Deploy monitoring stack on master
  hosts: masters
  become: true
  tasks:
    - name: Start monitoring stack
      ansible.builtin.command: docker compose up -d --pull always
      args:
        chdir: /home/enrico/homelab/monitoring
      environment:
        GRAFANA_ADMIN_PASSWORD: "{{ grafana_admin_password | default('changeme') }}"
      changed_when: true

- name: Remove monitoring stack from heavy (migrated to master)
  hosts: heavy
  become: true
  tasks:
    - name: Stop monitoring containers on heavy
      ansible.builtin.command: docker compose down --remove-orphans
      args:
        chdir: /home/enrico/pi-cluster/monitoring
      changed_when: true
      ignore_errors: true
