---
# Deploy OpenClaw cluster monitoring: health checks, watchdogs, cron
# Usage: make openclaw-monitoring
- name: Deploy health check script on master
  hosts: masters
  become: true
  vars_files:
    - ../vars/openclaw-nodes.yml
    - ../secrets/monitoring.yml

  tasks:
    - name: Deploy cluster health check script
      ansible.builtin.copy:
        src: ../scripts/openclaw-health.sh
        dest: /home/enrico/homelab/scripts/openclaw-health.sh
        mode: "0755"
        owner: enrico
        group: enrico

    - name: Deploy health check cron job
      ansible.builtin.cron:
        name: "openclaw cluster health check"
        minute: "{{ openclaw_health_check_interval }}"
        user: enrico
        job: "/home/enrico/homelab/scripts/openclaw-health.sh >> /var/log/openclaw-health.log 2>&1"
        cron_file: openclaw-health

    - name: Deploy openclaw.json backup cron
      ansible.builtin.cron:
        name: "openclaw config backup"
        minute: "0"
        hour: "3"
        user: enrico
        job: "cp /home/enrico/.openclaw/openclaw.json /home/enrico/.openclaw/openclaw.json.bak.$(date +\\%Y\\%m\\%d)"
        cron_file: openclaw-backup

    - name: Remove old manual budget check entry
      ansible.builtin.lineinfile:
        path: /etc/cron.d/openclaw-budget
        regexp: '^\d.*127\.0\.0\.1.*budget/check'
        state: absent
      become: true

    - name: Remove old manual budget digest entry
      ansible.builtin.lineinfile:
        path: /etc/cron.d/openclaw-budget
        regexp: '^\d.*127\.0\.0\.1.*budget/digest'
        state: absent
      become: true

    - name: Remove old budget comment lines
      ansible.builtin.lineinfile:
        path: /etc/cron.d/openclaw-budget
        regexp: '^#\s*(Budget check|Daily digest)'
        state: absent
      become: true

    - name: Deploy budget check cron (every 6 hours)
      ansible.builtin.cron:
        name: "openclaw budget check"
        minute: "0"
        hour: "*/6"
        user: enrico
        job: "curl -sf {{ cluster_api_url }}/budget/check >> /var/log/openclaw-budget.log 2>&1"
        cron_file: openclaw-budget

    - name: Deploy daily digest cron (8pm)
      ansible.builtin.cron:
        name: "openclaw daily digest"
        minute: "0"
        hour: "20"
        user: enrico
        job: "curl -sf {{ cluster_api_url }}/budget/digest >> /var/log/openclaw-budget.log 2>&1"
        cron_file: openclaw-budget

    - name: Deploy openclaw version check cron (nightly)
      ansible.builtin.cron:
        name: "openclaw version check"
        minute: "0"
        hour: "2"
        user: enrico
        job: "/home/enrico/homelab/scripts/openclaw-version-check.sh --upgrade >> /var/log/openclaw-version.log 2>&1"
        cron_file: openclaw-version

    - name: Remove old manual auto-deploy cron entry
      ansible.builtin.lineinfile:
        path: /etc/cron.d/openclaw-auto-deploy
        regexp: '^\*/5.*auto-deploy\.sh.*>>'
        state: absent
      become: true

    - name: Deploy auto-deploy cron (pull + apply configs)
      ansible.builtin.cron:
        name: "auto-deploy"
        minute: "*/15"
        user: enrico
        job: "/home/enrico/homelab/scripts/auto-deploy.sh"
        cron_file: openclaw-auto-deploy

    - name: Deploy old backup cleanup cron
      ansible.builtin.cron:
        name: "openclaw backup cleanup"
        minute: "0"
        hour: "4"
        user: enrico
        job: "find /home/enrico/.openclaw/ -name 'openclaw.json.bak.*' -mtime +7 -delete"
        cron_file: openclaw-backup

    - name: Deploy workspace ownership watchdog cron
      ansible.builtin.cron:
        name: "openclaw workspace ownership fix"
        minute: "*/30"
        user: enrico
        job: >-
          sudo find /mnt/external/openclaw/workspace -user root
          -exec chown 1000:1000 {} + 2>/dev/null;
          sudo find /mnt/external/openclaw/workspace -maxdepth 0
          ! -perm -g+s -exec chmod g+ws {} + 2>/dev/null
        cron_file: openclaw-workspace

    - name: Remove old manual cluster-health-check from user crontab
      ansible.builtin.lineinfile:
        path: /var/spool/cron/crontabs/enrico
        regexp: 'cluster-health-check'
        state: absent
      become: true

    - name: Deploy cluster health check cron (every 15 min)
      ansible.builtin.cron:
        name: "cluster health check"
        minute: "*/15"
        user: enrico
        job: "/usr/local/bin/cluster-health-check.sh"
        cron_file: openclaw-cluster-health-check

    - name: Remove old manual memory-watchdog from user crontab
      ansible.builtin.lineinfile:
        path: /var/spool/cron/crontabs/enrico
        regexp: 'memory-watchdog'
        state: absent
      become: true

    - name: Deploy memory watchdog cron (every 15 min)
      ansible.builtin.cron:
        name: "memory watchdog"
        minute: "*/15"
        user: enrico
        job: "/mnt/external/scripts/memory-watchdog.sh"
        cron_file: openclaw-memory-watchdog

    - name: Deploy stats collector service
      ansible.builtin.template:
        src: ../templates/openclaw-stats-collector.service.j2
        dest: /etc/systemd/system/openclaw-stats-collector.service
        mode: "0644"

    - name: Deploy stats collector timer
      ansible.builtin.template:
        src: ../templates/openclaw-stats-collector.timer.j2
        dest: /etc/systemd/system/openclaw-stats-collector.timer
        mode: "0644"

    - name: Enable stats collector timer
      ansible.builtin.systemd:
        name: openclaw-stats-collector.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: Deploy router API service
      ansible.builtin.template:
        src: ../templates/openclaw-router-api.service.j2
        dest: /etc/systemd/system/openclaw-router-api.service
        mode: "0644"

    - name: Enable router API service
      ansible.builtin.systemd:
        name: openclaw-router-api
        enabled: true
        state: started
        daemon_reload: true

    - name: Deploy cluster watchdog script
      ansible.builtin.copy:
        src: ../scripts/openclaw-watchdog-cluster.sh
        dest: /home/enrico/homelab/scripts/openclaw-watchdog-cluster.sh
        mode: "0755"
        owner: enrico
        group: enrico

    - name: Deploy cluster watchdog service
      ansible.builtin.template:
        src: ../templates/openclaw-watchdog-cluster.service.j2
        dest: /etc/systemd/system/openclaw-watchdog-cluster.service
        mode: "0644"

    - name: Deploy cluster watchdog timer
      ansible.builtin.template:
        src: ../templates/openclaw-watchdog-cluster.timer.j2
        dest: /etc/systemd/system/openclaw-watchdog-cluster.timer
        mode: "0644"

    - name: Enable cluster watchdog timer
      ansible.builtin.systemd:
        name: openclaw-watchdog-cluster.timer
        enabled: true
        state: started
        daemon_reload: true

- name: Deploy NFS watchdog on slave nodes
  hosts: openclaw_nodes:!masters
  become: true
  vars_files:
    - ../vars/openclaw-nodes.yml

  tasks:
    - name: Deploy NFS watchdog script
      ansible.builtin.template:
        src: ../templates/openclaw-watchdog.sh.j2
        dest: /usr/local/bin/openclaw-watchdog.sh
        mode: "0755"

    - name: Deploy watchdog systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/openclaw-watchdog.service
        mode: "0644"
        content: |
          [Unit]
          Description=OpenClaw NFS Mount Watchdog
          After=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/openclaw-watchdog.sh

    - name: Deploy watchdog systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/openclaw-watchdog.timer
        mode: "0644"
        content: |
          [Unit]
          Description=Run OpenClaw NFS watchdog every 2 minutes

          [Timer]
          OnBootSec=60
          OnUnitActiveSec={{ openclaw_watchdog_interval }}
          AccuracySec=30

          [Install]
          WantedBy=timers.target

    - name: Enable watchdog timer
      ansible.builtin.systemd:
        name: openclaw-watchdog.timer
        enabled: true
        state: started
        daemon_reload: true

- name: Deploy cluster alert script on all nodes
  hosts: cluster
  become: true
  tasks:
    - name: Deploy cluster-alert.sh
      ansible.builtin.copy:
        src: ../scripts/cluster-alert.sh
        dest: /usr/local/bin/cluster-alert.sh
        mode: "0750"
        owner: root
        group: enrico

- name: Deploy resource monitor on all nodes
  hosts: cluster
  become: true
  vars_files:
    - ../secrets/monitoring.yml
  tasks:
    - name: Deploy resource monitor script
      ansible.builtin.copy:
        src: ../scripts/resource-monitor.sh
        dest: /usr/local/bin/resource-monitor.sh
        mode: "0755"

    - name: Deploy .env.cluster for Telegram alerts
      ansible.builtin.template:
        src: ../templates/env.cluster.j2
        dest: /usr/local/bin/.env.cluster
        mode: "0600"
        owner: enrico
      no_log: true

    - name: Deploy .env.cluster to scripts directory
      ansible.builtin.template:
        src: ../templates/env.cluster.j2
        dest: /home/enrico/homelab/scripts/.env.cluster
        mode: "0600"
        owner: enrico
      no_log: true
      when: inventory_hostname == "master"

    - name: Deploy resource monitor cron (every 15 min)
      ansible.builtin.cron:
        name: "resource monitor"
        minute: "*/15"
        user: enrico
        job: "/usr/local/bin/resource-monitor.sh"
        cron_file: openclaw-resource-monitor

# ── Heavy Node: Storage Hardening ─────��──────────────────────────────────────
# Protects NVMe from write exhaustion (recurring failure pattern).
- name: Harden heavy node storage
  hosts: heavy
  become: true
  vars_files:
    - ../secrets/monitoring.yml
  vars:
    heavy_repo_dir: /home/enrico/pi-cluster
  tasks:
    # ── SSH Watchdog ──────────────────────────────────────────────────────────
    - name: Deploy SSH watchdog script
      ansible.builtin.copy:
        src: ../scripts/ssh-watchdog.sh
        dest: "{{ heavy_repo_dir }}/scripts/ssh-watchdog.sh"
        mode: "0755"
        owner: enrico
        group: enrico

    - name: Deploy SSH watchdog service
      ansible.builtin.template:
        src: ../templates/ssh-watchdog.service.j2
        dest: /etc/systemd/system/ssh-watchdog.service
        mode: "0644"

    - name: Deploy SSH watchdog timer
      ansible.builtin.template:
        src: ../templates/ssh-watchdog.timer.j2
        dest: /etc/systemd/system/ssh-watchdog.timer
        mode: "0644"

    - name: Enable SSH watchdog timer
      ansible.builtin.systemd:
        name: ssh-watchdog.timer
        enabled: true
        state: started
        daemon_reload: true

    # ── Reverse SSH Tunnel ────────────────────────────────────────────────────
    - name: Install autossh
      ansible.builtin.apt:
        name: autossh
        state: present

    - name: Deploy reverse SSH tunnel service
      ansible.builtin.template:
        src: ../templates/autossh-reverse-tunnel.service.j2
        dest: /etc/systemd/system/autossh-reverse-tunnel.service
        mode: "0644"

    - name: Enable reverse SSH tunnel
      ansible.builtin.systemd:
        name: autossh-reverse-tunnel
        enabled: true
        state: started
        daemon_reload: true

    # ── Disk Health Monitor ──────────��────────────────────────────────────────
    - name: Deploy disk health monitor script
      ansible.builtin.copy:
        src: ../scripts/disk-health-monitor.sh
        dest: "{{ heavy_repo_dir }}/scripts/disk-health-monitor.sh"
        mode: "0755"
        owner: enrico
        group: enrico

    - name: Install smartmontools
      ansible.builtin.apt:
        name: smartmontools
        state: present

    - name: Allow enrico to run smartctl without password
      ansible.builtin.copy:
        dest: /etc/sudoers.d/smartctl
        content: "enrico ALL=(ALL) NOPASSWD: /usr/sbin/smartctl\n"
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Deploy disk health monitor cron (every 5 min)
      ansible.builtin.cron:
        name: "disk health monitor"
        minute: "*/5"
        user: enrico
        job: "{{ heavy_repo_dir }}/scripts/disk-health-monitor.sh"
        cron_file: openclaw-disk-health

    # ── Life Automation: Nightly Consolidation ───────────────────────────────
    - name: Deploy nightly-consolidate cron (2am daily)
      ansible.builtin.cron:
        name: "nightly life consolidation"
        minute: "0"
        hour: "2"
        user: enrico
        job: "{{ heavy_repo_dir }}/life-automation/nightly-consolidate.sh"
        cron_file: openclaw-nightly-consolidate

    # ── noatime (biggest free write reduction) ─────��──────────────────────────
    - name: Set noatime on root filesystem
      ansible.posix.mount:
        path: /
        src: "{{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='device') | first }}"
        fstype: ext4
        opts: defaults,noatime
        state: mounted

    # ── zram swap (replace SSD swap file) ─────────��───────────────────────���───
    - name: Install zram-tools
      ansible.builtin.apt:
        name: zram-tools
        state: present

    - name: Configure zram (25% of RAM)
      ansible.builtin.copy:
        dest: /etc/default/zramswap
        content: |
          ALGO=zstd
          PERCENT=25
        mode: "0644"

    - name: Disable swap file
      ansible.builtin.command: swapoff /swap.img
      register: swapoff_result
      failed_when: false
      changed_when: swapoff_result.rc == 0

    - name: Remove swap file from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: 'swap\.img'
        state: absent

    - name: Restart zramswap
      ansible.builtin.systemd:
        name: zramswap
        state: restarted
        enabled: true

    - name: Set swappiness to 10
      ansible.posix.sysctl:
        name: vm.swappiness
        value: "10"
        state: present
        reload: true

    # ── Journald storage limits ─────────────────────────────────────────────
    - name: Create journald.conf.d directory
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        mode: "0755"

    - name: Configure journald storage limits
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/storage-limits.conf
        content: |
          [Journal]
          SystemMaxUse=50M
          RuntimeMaxUse=50M
          MaxFileSec=1day
        mode: "0644"
      register: journald_conf

    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
      when: journald_conf.changed

    # ── Logrotate daily ────────────��─────────────────────────��────────────────
    - name: Configure daily logrotate for rsyslog
      ansible.builtin.copy:
        dest: /etc/logrotate.d/rsyslog-daily
        content: |
          /var/log/syslog
          /var/log/mail.log
          /var/log/kern.log
          /var/log/auth.log
          {
              daily
              rotate 7
              compress
              delaycompress
              missingok
              notifempty
              postrotate
                  /usr/lib/rsyslog/rsyslog-rotate
              endscript
          }
        mode: "0644"

    # ── Docker daemon config (local log driver) ──────────────────────────────
    - name: Deploy Docker daemon configuration
      ansible.builtin.template:
        src: ../templates/docker-daemon.json.j2
        dest: /etc/docker/daemon.json
        mode: "0644"
      register: docker_daemon_conf

    - name: Restart Docker daemon
      ansible.builtin.systemd:
        name: docker
        state: restarted
      when: docker_daemon_conf.changed

    # ── fstrim timer ──────────────────────────────────────────────────────────
    - name: Enable fstrim timer
      ansible.builtin.systemd:
        name: fstrim.timer
        enabled: true
        state: started

    # ── MongoDB journal to tmpfs ──────────��──────────────────────────��────────
    - name: Mount MongoDB journal as tmpfs
      ansible.posix.mount:
        path: /home/enrico/mongodb-data/journal
        src: tmpfs
        fstype: tmpfs
        opts: "size=512M,mode=0755,uid=999,gid=999"
        state: mounted

    # ── MongoDB checkpoint interval ────��───────────────────────────────��──────
    - name: Create MongoDB custom config directory
      ansible.builtin.file:
        path: /home/enrico/mongodb-data/configdb
        state: directory
        mode: "0755"

    - name: Deploy MongoDB config for extended checkpoint interval
      ansible.builtin.copy:
        dest: /home/enrico/mongodb-data/configdb/mongod.conf
        content: |
          storage:
            wiredTiger:
              engineConfig:
                checkpointSizeMB: 0
          setParameter:
            wiredTigerCheckpointDelaySecs: 300
        mode: "0644"

    # ── SQLite WAL mode for OpenClaw databases ────────────────────────────────
    - name: Set WAL mode on OpenClaw SQLite databases
      ansible.builtin.shell: |
        for db in /home/enrico/.openclaw/memory/main.sqlite /home/enrico/data/openclaw-dispatch-log.db; do
          [ -f "$db" ] && sqlite3 "$db" "PRAGMA journal_mode=WAL;" 2>/dev/null || true
        done
      changed_when: false

    # ── Kernel writeback tuning (reduce burst writes to NVMe) ─────────────────
    - name: Reduce dirty_ratio (default 20 → 5)
      ansible.posix.sysctl:
        name: vm.dirty_ratio
        value: "5"
        state: present
        reload: true

    - name: Reduce dirty_background_ratio (default 10 → 2)
      ansible.posix.sysctl:
        name: vm.dirty_background_ratio
        value: "2"
        state: present
        reload: true

    - name: Reduce dirty_expire (default 3000cs → 1500cs)
      ansible.posix.sysctl:
        name: vm.dirty_expire_centisecs
        value: "1500"
        state: present
        reload: true

    # ── Docker image prune cron (prevent image accumulation) ──────────────────
    - name: Deploy Docker image prune cron (weekly)
      ansible.builtin.cron:
        name: "docker image prune"
        minute: "0"
        hour: "3"
        weekday: "0"
        user: root
        job: "docker image prune -af --filter 'until=168h' >> /var/log/docker-prune.log 2>&1"
        cron_file: openclaw-docker-prune

    # ── Docker build cache prune cron ─────────────────────────────────────────
    - name: Deploy Docker build cache prune cron (weekly)
      ansible.builtin.cron:
        name: "docker builder prune"
        minute: "15"
        hour: "3"
        weekday: "0"
        user: root
        job: "docker builder prune -af --filter 'until=168h' >> /var/log/docker-prune.log 2>&1"
        cron_file: openclaw-docker-prune

- name: Ensure critical services on master
  hosts: masters
  become: true
  tasks:
    - name: Cloudflare tunnel enabled and running
      ansible.builtin.systemd:
        name: cloudflared
        state: started
        enabled: true
    - name: Polymarket bot enabled and running
      ansible.builtin.systemd:
        name: polymarket-bot
        state: started
        enabled: true
