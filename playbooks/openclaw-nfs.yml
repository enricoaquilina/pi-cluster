---
# Configure NFS server on heavy and NFS clients on slave nodes.
# Phase 12: heavy is primary NFS server; master is backup replica.
# Usage: make openclaw-nfs
- name: Configure NFS server on heavy
  hosts: heavy
  become: true
  vars_files:
    - ../vars/openclaw-nodes.yml

  tasks:
    - name: Install NFS server
      ansible.builtin.apt:
        name: nfs-kernel-server
        state: present
        update_cache: true

    - name: Ensure exports.d directory exists
      ansible.builtin.file:
        path: /etc/exports.d
        state: directory
        mode: "0755"

    - name: Ensure data directory exists
      ansible.builtin.file:
        path: /mnt/data
        state: directory
        owner: enrico
        group: enrico
        mode: "0755"

    - name: Deploy NFS exports
      ansible.builtin.template:
        src: ../templates/nfs-exports.j2
        dest: /etc/exports.d/openclaw.exports
        mode: "0644"
      notify: Re-export NFS

    - name: Open NFS ports in UFW (LAN only)
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: tcp
        from_ip: 192.168.0.0/24
        comment: "{{ item.comment }}"
      loop:
        - { port: "111", comment: "rpcbind - NFS cluster" }
        - { port: "2049", comment: "NFS cluster" }
        - { port: "20048", comment: "NFS mountd cluster" }

    - name: Deploy NFS backup service
      ansible.builtin.template:
        src: ../templates/nfs-backup.service.j2
        dest: /etc/systemd/system/nfs-backup.service
        mode: "0644"
      notify: Reload systemd

    - name: Deploy NFS backup timer (hourly)
      ansible.builtin.template:
        src: ../templates/nfs-backup.timer.j2
        dest: /etc/systemd/system/nfs-backup.timer
        mode: "0644"
      notify: Reload systemd

    - name: Enable NFS backup timer
      ansible.builtin.systemd:
        name: nfs-backup.timer
        state: started
        enabled: true
        daemon_reload: true

  handlers:
    - name: Re-export NFS
      ansible.builtin.command: exportfs -ra
      changed_when: true

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

- name: Disable NFS server on master (migrated to heavy)
  hosts: masters
  become: true
  vars:
    ansible_connection: ssh
    ansible_host: 192.168.0.22

  tasks:
    - name: Stop and disable NFS server
      ansible.builtin.systemd:
        name: nfs-kernel-server
        state: stopped
        enabled: false
      ignore_errors: true

- name: Configure NFS clients on slave nodes (excluding heavy)
  hosts: slaves:!heavy
  become: true
  vars_files:
    - ../vars/openclaw-nodes.yml

  tasks:
    - name: Install NFS client
      ansible.builtin.apt:
        name: nfs-common
        state: present
        update_cache: true

    - name: Ensure mount directories exist
      ansible.builtin.shell: "test -d {{ item.mount }} || mkdir -p {{ item.mount }}"
      loop: "{{ nfs_exports }}"
      changed_when: false

    - name: Configure NFS mounts in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: "^.*:{{ item.path }}\\s+{{ item.mount }}\\s"
        line: "{{ nfs_server_override | default(nfs_server) }}:{{ item.path }} {{ item.mount }} nfs {{ nfs_options }} 0 0"
        state: present
      loop: "{{ nfs_exports }}"

    - name: Mount NFS filesystems (if not already mounted)
      ansible.builtin.shell: "mountpoint -q {{ item.mount }} || mount {{ item.mount }}"
      loop: "{{ nfs_exports }}"
      changed_when: false

    - name: Create /opt/workspace symlink to NFS mount
      ansible.builtin.file:
        src: /mnt/external
        dest: /opt/workspace
        state: link
        force: true

    - name: Verify NFS mounts
      ansible.builtin.command: "mountpoint -q {{ item.mount }}"
      loop: "{{ nfs_exports }}"
      changed_when: false
      register: nfs_check

    - name: Display NFS mount status
      ansible.builtin.debug:
        msg: "{{ item.item.mount }}: {{ 'MOUNTED' if item.rc == 0 else 'FAILED' }}"
      loop: "{{ nfs_check.results }}"
