---
# Deploy and configure OpenClaw node hosts on slave nodes
# Usage: make openclaw-nodes
- name: Deploy OpenClaw node hosts
  hosts: openclaw_nodes
  become: true
  vars_files:
    - ../vars/openclaw-nodes.yml
    - ../secrets/openclaw.yml

  tasks:
    - name: Check if openclaw is installed
      ansible.builtin.command: openclaw --version
      register: openclaw_version
      changed_when: false
      failed_when: false

    - name: Display openclaw version
      ansible.builtin.debug:
        msg: "openclaw version: {{ openclaw_version.stdout | default('NOT INSTALLED') }}"

    - name: Fail if openclaw is not installed
      ansible.builtin.fail:
        msg: >
          openclaw is not installed on {{ inventory_hostname }}.
          Install it manually: sudo npm install -g openclaw
      when: openclaw_version.rc != 0

    - name: Deploy openclaw node systemd service
      ansible.builtin.template:
        src: ../templates/openclaw-node.service.j2
        dest: /etc/systemd/system/openclaw-node.service
        mode: "0644"
      notify: Restart openclaw node

    - name: Ensure .openclaw directory exists
      ansible.builtin.file:
        path: /home/enrico/.openclaw
        state: directory
        owner: enrico
        group: enrico
        mode: "0700"

    - name: Deploy exec approvals config
      ansible.builtin.template:
        src: ../templates/exec-approvals.json.j2
        dest: /home/enrico/.openclaw/exec-approvals.json
        owner: enrico
        group: enrico
        mode: "0600"
      notify: Restart openclaw node

    - name: Enable and start openclaw node service
      ansible.builtin.systemd:
        name: openclaw-node
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart openclaw node
      ansible.builtin.systemd:
        name: openclaw-node
        state: restarted
        daemon_reload: true
