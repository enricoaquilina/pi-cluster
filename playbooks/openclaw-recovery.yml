---
# Disaster recovery: rebuild the OpenClaw agent cluster from scratch
# Usage: make openclaw-recovery
#
# Prerequisites:
#   - openclaw installed on all slave nodes
#   - SSH access to all nodes
#   - Master gateway running
#
# This playbook:
#   1. Re-deploys openclaw node services
#   2. Re-mounts NFS
#   3. Re-deploys monitoring
#   4. Auto-pairs nodes with gateway
#   5. Verifies cluster health

- name: "Recovery Step 1: Verify master gateway is running"
  hosts: masters
  become: false

  tasks:
    - name: Check gateway process
      ansible.builtin.shell: "docker ps --filter name=openclaw --format '{{ '{{' }}.Names{{ '}}' }}' | head -5"
      register: gateway_check
      changed_when: false

    - name: Display gateway status
      ansible.builtin.debug:
        msg: "Gateway containers: {{ gateway_check.stdout_lines | default(['NONE FOUND']) }}"

    - name: Warn if gateway not running
      ansible.builtin.debug:
        msg: "WARNING: No OpenClaw gateway containers found. Start the gateway before proceeding."
      when: gateway_check.stdout | length == 0

- name: "Recovery Step 2: Re-deploy node hosts"
  ansible.builtin.import_playbook: openclaw-nodes.yml

- name: "Recovery Step 3: Re-mount NFS"
  ansible.builtin.import_playbook: openclaw-nfs.yml

- name: "Recovery Step 4: Re-deploy monitoring"
  ansible.builtin.import_playbook: openclaw-monitoring.yml

- name: "Recovery Step 5: Auto-pair nodes with gateway"
  hosts: masters
  become: false

  tasks:
    - name: Run auto-pairing script
      ansible.builtin.command: bash /home/enrico/homelab/scripts/openclaw-pair-nodes.sh
      register: pairing_result
      changed_when: "'Paired:' in pairing_result.stdout"

    - name: Display pairing result
      ansible.builtin.debug:
        msg: "{{ pairing_result.stdout_lines }}"

- name: "Recovery Step 6: Post-recovery verification"
  hosts: openclaw_nodes
  become: false
  vars_files:
    - ../vars/openclaw-nodes.yml

  tasks:
    - name: Verify openclaw node service is running
      ansible.builtin.systemd:
        name: openclaw-node
      register: node_service
      changed_when: false

    - name: Display node service status
      ansible.builtin.debug:
        msg: "openclaw-node on {{ inventory_hostname }}: {{ node_service.status.ActiveState | default('unknown') }}"

    - name: Verify NFS mounts
      ansible.builtin.command: "mountpoint -q {{ item.mount }}"
      loop: "{{ nfs_exports }}"
      changed_when: false
      failed_when: false
      register: nfs_verify

    - name: Display NFS status
      ansible.builtin.debug:
        msg: "{{ item.item.mount }}: {{ 'MOUNTED' if item.rc == 0 else 'NOT MOUNTED' }}"
      loop: "{{ nfs_verify.results }}"

- name: "Recovery Step 7: Post-recovery manual verification"
  hosts: masters
  become: false

  tasks:
    - name: Display verification steps
      ansible.builtin.debug:
        msg:
          - "=== Recovery Complete — Verify ==="
          - "1. Check nodes are connected:"
          - "   openclaw nodes status"
          - ""
          - "2. Test execution:"
          - "   openclaw nodes run --node build --raw 'echo hello'"
          - "   openclaw nodes run --node light --raw 'echo hello'"
