---
# Secret Rotation — templates all .env files from Ansible vault
# Usage: make rotate-secrets
#   or:  ansible-playbook playbooks/secret-rotation.yml --vault-password-file secrets-vault-password
#
# After editing vault secrets (ansible-vault edit secrets/openclaw.yml),
# run this to propagate changes to all .env files and restart services.

- name: Rotate MC secrets on heavy
  hosts: heavy
  become: true
  vars_files:
    - ../secrets/openclaw.yml
  tasks:
    - name: Template MC .env from vault
      ansible.builtin.template:
        src: ../templates/mission-control.env.j2
        dest: /home/enrico/pi-cluster/mission-control/.env
        mode: "0600"
        owner: enrico
      register: mc_env

    - name: Rebuild MC if secrets changed
      ansible.builtin.command: docker compose up -d --build
      args:
        chdir: /home/enrico/mission-control
      when: mc_env.changed

- name: Rotate cluster secrets on master
  hosts: masters
  become: true
  vars_files:
    - ../secrets/monitoring.yml
  tasks:
    - name: Template .env.cluster to scripts dir
      ansible.builtin.template:
        src: ../templates/env.cluster.j2
        dest: /home/enrico/homelab/scripts/.env.cluster
        mode: "0600"
        owner: enrico
      no_log: true

    - name: Template .env.cluster to /usr/local/bin
      ansible.builtin.template:
        src: ../templates/env.cluster.j2
        dest: /usr/local/bin/.env.cluster
        mode: "0600"
        owner: enrico
      no_log: true
