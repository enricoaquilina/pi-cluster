# OpenClaw Multi-Model Orchestration
# Maps task types to preferred models based on cost/capability tradeoffs
#
# Model strengths (March 2026):
#   Opus 4.6:     Best reasoning, 1M context, $5/$25       → heavy compute
#   Sonnet 4.6:   Best code quality, 1M context, $3/$15    → coding
#   GPT-5.4:      Strong reasoning, 1M context, $2.5/$15   → compute fallback
#   GLM-5:        Complex systems, low hallucination, $0.72/$2.30 → coding fallback
#   Qwen 3.5+:    1M context, multimodal, $0.26/$1.56      → research
#   MiniMax M2.7:  Best value, 96% coding accuracy, $0.30/$1.20 → general/any
#   Gemini Flash:  Fast + cheap, 1M context, $0.30/$2.50   → any fallback

openclaw_model_config:
  task_models:
    research:
      primary: "openrouter/qwen/qwen3.5-plus-02-15"
      fallbacks:
        - "openrouter/minimax/minimax-m2.7"
        - "openrouter/google/gemini-2.5-flash-lite"
      reason: "Qwen 3.5 Plus: 1M context at $0.26 input, best for large document ingestion"

    coding:
      primary: "openrouter/anthropic/claude-sonnet-4.6"
      fallbacks:
        - "openrouter/z-ai/glm-5"
        - "openrouter/minimax/minimax-m2.7"
      reason: "Sonnet 4.6: best code quality. GLM-5: complex systems. MiniMax: best value"

    compute:
      primary: "openrouter/anthropic/claude-opus-4.6"
      fallbacks:
        - "openrouter/openai/gpt-5.4"
        - "openrouter/z-ai/glm-5"
      reason: "Opus 4.6: best reasoning. GPT-5.4: large context. GLM-5: low hallucination"

    any:
      primary: "openrouter/minimax/minimax-m2.7"
      fallbacks:
        - "openrouter/google/gemini-2.5-flash"
        - "openrouter/deepseek/deepseek-v3.2"
      reason: "MiniMax M2.7: 96% coding accuracy at $0.30/$1.20 — best overall value"

  cost_limits:
    research: 0.10
    coding: 1.00
    compute: 5.00
    any: 0.25
